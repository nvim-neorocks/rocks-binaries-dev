name: Debug build win32-x86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install C/C++ Compiler
        uses: rlalik/setup-cpp-compiler@master
        with:
          compiler: clang-latest

      - name: Install MSVC Compiler Toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Lua and LuaRocks
        run: |
          python -m pip install hererocks
          python -m hererocks env --lua 5.1 --luarocks latest

      - name: Install build dependencies
        run: |
          luarocks --local --lua-version=5.1 install luafilesystem --server='https://nvim-neorocks.github.io/rocks-binaries/'
          luarocks --local --lua-version=5.1 install luarocks-build-treesitter-parser --server='https://nvim-neorocks.github.io/rocks-binaries/'

      - name: Install tree-sitter parser
        run:
          luarocks --verbose --local --dev --lua-version=5.1 install tree-sitter-haskell scm
        if: always()

      - name: Install tree-sitter parser (non-verbose)
        run:
          luarocks --local --dev --lua-version=5.1 install tree-sitter-haskell scm
        if: always()
